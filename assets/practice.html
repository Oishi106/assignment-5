<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- navbar -->
    <nav class="sticky top-0 bg-[#FFFFFF] shadow-md">
         <div class="container mx-auto flex flex-col md:flex-row justify-between items-center px-4 md:px-8 py-4 md:py-6">
        
        <!-- Logo -->
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 items-center">
            <img class="h-[40px]" src="./logo.png" alt="">
            <h1 class="text-[#006747] font-bold text-center sm:text-left">
                Emergency <br> Service
            </h1>
        </div>

        <!-- Stats / Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 mt-4 md:mt-0">
            <div class="h-[40px] w-[80px] flex items-center justify-center gap-2 bg-[#41FF6B1A] border-2 border-blue-500 rounded-[16px]">
                <span class="font-bold">0</span>
                <img class="h-7" src="./heart.png" alt="">
            </div>
            <div class="h-[40px] w-[75px] flex items-center justify-center gap-2 bg-[#41FF6B1A] border-2 border-blue-500 rounded-[16px]">
                <span class="font-bold">100</span>
                <img class="h-6" src="./coin.png" alt="">
            </div>
            <div class="h-[40px] w-[80px] flex items-center justify-center gap-2 bg-[#00A63E] border-2 border-blue-500 rounded-[16px]">
                <span class="font-bold text-white">2 Copy</span>
            </div>
        </div>

    </div>
</nav>

    
</body>
</html>
